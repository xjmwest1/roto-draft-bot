services:
  - type: worker
    name: roto-draft-bot
    runtime: node
    plan: starter
    region: virginia
    repo: https://github.com/xjmwest1/roto-draft-bot
    branch: main

    buildCommand: |
      export NODE_OPTIONS=--max-old-space-size=1536
      corepack enable
      pnpm install --frozen-lockfile --ignore-scripts
      pnpm rebuild
      pnpm build

    startCommand: sh scripts/render-start.sh

    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1

    envVars:
      - key: NODE_VERSION
        value: 20
      
      - key: NODE_OPTIONS
        value: --max-old-space-size=384

      - key: DISCORD_TOKEN
        sync: false

      - key: DISCORD_CLIENT_ID
        sync: false

      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false

      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /var/data/google-credentials.json

      - key: SQLITE_PATH
        value: /var/data/bot.db

      - key: POLL_INTERVAL_MS
        value: 60000